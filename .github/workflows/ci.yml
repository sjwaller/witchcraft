name: CI

# Full workspace validation on native-arch runners. This is where grimoire's
# native-build integration tests (crates/grimoire/tests/build.rs — compile a
# .witch to a native binary and assert compiled == interpreted) gate merges.
# The Release workflow builds and packages grimoire for every target but does
# NOT run those link-sensitive tests in the cross-platform matrix.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --all
      - name: Test (full workspace, incl. grimoire native-build)
        run: cargo test --all
      - name: Compile and run example executables (ship path)
        run: |
          set -euo pipefail
          cargo build -p grimoire
          GRIMOIRE=target/debug/grimoire
          "$GRIMOIRE" --version
          # Build each example to a self-contained native executable and run it,
          # asserting the compiled output matches `witch run` for a fixed seed.
          for example in host triage; do
            "$GRIMOIRE" build "examples/$example.witch" -o "/tmp/$example"
            compiled="$("/tmp/$example" --seed 1)"
            interpreted="$(target/debug/witch run "examples/$example.witch" --seed 1)"
            if [ "$compiled" != "$interpreted" ]; then
              echo "compiled vs interpreted mismatch for $example"; exit 1
            fi
            echo "$example: compiled == interpreted"
          done
