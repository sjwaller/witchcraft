name: Release

# Build self-contained binaries for every supported platform on a version tag,
# gate on a host-independent test suite (excluding grimoire's native-build link
# tests — those live in ci.yml on a native runner), and publish archives +
# checksums as release assets.
# This workflow is the ONLY place Rust is required; users download the results.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # native_test: run the full suite on this runner (host arch == target).
          # use_cross: build via `cross` (containerised linker); otherwise plain cargo.
          - os: macos-latest
            target: aarch64-apple-darwin
            native_test: true
            use_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            native_test: false
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            native_test: true
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            native_test: false
            use_cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            native_test: true
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-build tooling (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          cargo install cross --locked

      # Cross-arch targets are built and packaged but not test-run: the runner
      # cannot execute cross-arch test binaries. Native-arch targets run the
      # workspace suite EXCLUDING grimoire (see Test step) — grimoire's
      # compile-and-link integration tests depend on the host linker and are
      # gated in ci.yml instead.
      - name: Test
        if: matrix.native_test
        run: |
          cargo test --release --locked --target ${{ matrix.target }} \
            --workspace --exclude grimoire

      - name: Build
        if: "!matrix.use_cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          staging="witchcraft-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/witch" "$staging/"
          cp "target/${{ matrix.target }}/release/grimoire" "$staging/"
          cp README.md LICENSE* "$staging/" 2>/dev/null || true
          tar czf "$staging.tar.gz" "$staging"
          shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          staging="witchcraft-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/witch.exe" "$staging/"
          cp "target/${{ matrix.target }}/release/grimoire.exe" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          7z a "$staging.zip" "$staging"
          certutil -hashfile "$staging.zip" SHA256 > "$staging.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: witchcraft-${{ matrix.target }}
          path: |
            witchcraft-*.tar.gz*
            witchcraft-*.zip*

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: cat dist/*.sha256 > dist/SHA256SUMS || true

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
          generate_release_notes: true
